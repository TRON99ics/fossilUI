<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta
      name="description"
      content="Northbound Labs — a software engineering studio building custom software, web & mobile apps, and cloud platforms for ambitious teams."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Northbound Labs — Software engineered with intent.</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme')
          var m = window.matchMedia('(prefers-color-scheme: dark)').matches
          var dark = t ? t === 'dark' : m
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
