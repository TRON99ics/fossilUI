<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <meta name="description" content="Glimpse — a fast, modern social platform to share moments, follow creators, and discover what's trending." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <title>Glimpse — share what's happening</title>
    <script>
      // Apply persisted theme before paint to avoid flash
      (function () {
        try {
          var t = localStorage.getItem("glimpse:theme");
          var root = document.documentElement;
          if (t === "light") {
            root.classList.remove("dark");
            root.classList.add("light");
          } else {
            root.classList.add("dark");
            root.classList.remove("light");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-app text-base-strong">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
